databaseChangeLog:
  - changeSet:
      id: 003-meta-relation
      author: multistorage
      changes:
        - createTable:
            tableName: meta_relation
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: from_table_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_meta_relation_from_table
                    references: meta_table(id)
              - column:
                  name: to_table_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_meta_relation_to_table
                    references: meta_table(id)
              - column:
                  name: from_column
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: to_column
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: is_one_to_many
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: alias
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
