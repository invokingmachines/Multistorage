<section class="admin-page">
  <h2>MetaTable</h2>
  <app-generic-table [columns]="tableColumns" [rows]="$any(metaTables)" (cellEdit)="onGenericCellEdit($event)" />

  <h2>MetaColumn</h2>
  <app-generic-table [columns]="columnColumns" [rows]="$any(metaColumns)" (cellEdit)="onGenericCellEdit($event)" />

  <h2>MetaRelation</h2>
  <app-generic-table [columns]="relationColumns" [rows]="$any(metaRelations)" (cellEdit)="onGenericCellEdit($event)" />

  @if (adminDirty) {
    <button type="button" class="save-floating-btn" (click)="saveAllDirty()" [disabled]="saving">
      {{ saving ? 'Saving...' : 'Save' }}
    </button>
  }
</section>
