<section class="table-section">
  @if (selectedTable) {
    <div class="layout">
      <div class="left-pane">
        <app-query-body-preview [path]="requestPath" [body]="requestBody" [title]="'Request body'" />
        <app-query-body-preview [path]="''" [body]="responseBody" [title]="'Response sample (first entity)'" />
      </div>

      <div class="right-pane">
        <div class="menu-over-table">
          <app-menu [tenantCode]="tenantCode" [centered]="true" />
        </div>

        <app-entity-multiselect
          [entityPathSegment]="selectedTable.pathSegment"
          [columns]="selectedColumns"
        />

        <div class="header-row">
          <h2>{{ selectedTable.alias || selectedTable.name }}</h2>
          <button type="button" (click)="search()">Search</button>
        </div>

        <app-generic-table
          [columns]="browserColumns"
          [rows]="rows"
          [extraColumns]="[{ key: 'edit', label: '', template: editActionTpl }]"
          [showFilters]="true"
          [showDataTypes]="true"
          [sortBy]="sortBy"
          [sortOrder]="sortOrder"
          [filterState]="tableFilterState()"
          (sortToggle)="toggleSortByTableColumn($event)"
          (filterChange)="onGenericFilterChange($event)"
        />

        <ng-template #editActionTpl let-row>
          <a
            [routerLink]="['/', tenantCode, 'browser', selectedTable.pathSegment, $any(row)[entityIdKey]]"
            [class.disabled-link]="!$any(row)[entityIdKey]"
            (click)="!$any(row)[entityIdKey] && $event.preventDefault()"
          >
            Edit
          </a>
        </ng-template>
      </div>
    </div>
  }
</section>
