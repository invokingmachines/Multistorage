databaseChangeLog:
  - changeSet:
      id: 002-create-child-meta-table
      author: system
      changes:
        - createTable:
            tableName: child_meta
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: child_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: meta_value
                  type: TEXT
                  constraints:
                    nullable: false
  - changeSet:
      id: 002-create-child-table
      author: system
      changes:
        - createTable:
            tableName: child
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: parent_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: child_meta_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: value
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: child
            baseColumnNames: parent_id
            constraintName: fk_child_parent
            referencedTableName: parent
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: child
            baseColumnNames: child_meta_id
            constraintName: fk_child_child_meta
            referencedTableName: child_meta
            referencedColumnNames: id
            onDelete: RESTRICT
