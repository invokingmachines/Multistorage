databaseChangeLog:
  - changeSet:
      id: 002-create-child-table
      author: system
      changes:
        - createTable:
            tableName: child
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: parent_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: value
                  type: INTEGER
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: child
            baseColumnNames: parent_id
            constraintName: fk_child_parent
            referencedTableName: parent
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_child_parent_id
            tableName: child
            columns:
              - column:
                  name: parent_id
